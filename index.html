<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImmiFlow | Visa Attorney Assistant</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .chat-height { height: calc(100vh - 200px); }
        /* Smooth scrolling for the chat window */
        #chat-window { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="glass border-b border-slate-200 sticky top-0 z-50 px-6 py-4">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-slate-800">ImmiFlow <span class="text-indigo-600">AI</span></h1>
                    <div class="flex items-center gap-1.5">
                        <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>
                        <span class="text-[10px] uppercase font-bold text-slate-500 tracking-widest">Attorney Assistant v2.6</span>
                    </div>
                </div>
            </div>
            <div class="hidden md:block">
                <span class="text-[11px] font-medium text-red-500 border border-red-100 bg-red-50 px-3 py-1.5 rounded-full">
                    ⚠️ Educational Purposes Only • No Attorney-Client Privilege
                </span>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div id="chat-window" class="chat-height overflow-y-auto pr-2 space-y-6">
            <div class="flex justify-start items-end gap-3">
                <div class="w-8 h-8 rounded-full bg-slate-200 flex-shrink-0 flex items-center justify-center text-xs font-bold text-slate-500">AI</div>
                <div class="bg-white border border-slate-200 p-5 rounded-2xl rounded-bl-none shadow-sm max-w-[85%] text-slate-700 leading-relaxed">
                    Greetings. I am your specialized US Immigration assistant. I can help navigate H1B, L1, O1, and EB-category visas. 
                    <br><br>
                    <span class="font-semibold italic text-slate-500">What is on your mind today?</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-white/80 backdrop-blur-md border-t border-slate-200 p-6">
        <div class="max-w-4xl mx-auto">
            <div class="relative flex items-center">
                <input type="text" id="userInput" 
                    class="w-full pl-5 pr-32 py-4 bg-white border border-slate-200 rounded-2xl shadow-xl shadow-slate-200/50 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-slate-700 placeholder-slate-400"
                    placeholder="Ask about 60-day grace periods, PERM, or I-140...">
                
                <button onclick="sendMessage()" 
                    class="absolute right-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-semibold text-sm transition-all flex items-center gap-2 shadow-lg shadow-indigo-200">
                    Send
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                </button>
            </div>
            <p class="text-center text-[10px] text-slate-400 mt-3 font-medium uppercase tracking-widest">Powered by Gemini 3.1 Flash & LangGraph</p>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            const loadingId = addLoading();

            try {
                const response = await fetch('http://localhost:8000/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "text": text })
                });
                
                const data = await response.json();
                document.getElementById(loadingId).remove();
                appendMessage(data.reply, 'agent');
            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage("System offline. Please ensure your Python backend is active.", 'error');
            }
        }

        function appendMessage(content, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} items-end gap-3`;
            
            let htmlContent = content;
            if (sender === 'agent') {
                htmlContent = marked.parse(content);
            }

            const bubbleBase = "p-5 rounded-2xl shadow-sm max-w-[85%] leading-relaxed";
            const bubbleStyle = sender === 'user' 
                ? "bg-indigo-600 text-white rounded-br-none shadow-indigo-100" 
                : sender === 'error' 
                ? "bg-red-50 text-red-600 border border-red-100" 
                : "bg-white border border-slate-200 text-slate-700 rounded-bl-none prose prose-slate prose-sm max-w-none";

            wrapper.innerHTML = `
                ${sender === 'agent' ? '<div class="w-8 h-8 rounded-full bg-slate-100 flex-shrink-0 flex items-center justify-center text-[10px] font-bold text-slate-400 border border-slate-200">AI</div>' : ''}
                <div class="${bubbleBase} ${bubbleStyle}">${htmlContent}</div>
                ${sender === 'user' ? '<div class="w-8 h-8 rounded-full bg-indigo-100 flex-shrink-0 flex items-center justify-center text-[10px] font-bold text-indigo-600">ME</div>' : ''}
            `;
            
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start items-center gap-3 animate-pulse";
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-slate-100 border border-slate-200"></div>
                <div class="bg-slate-100 px-4 py-2 rounded-full text-slate-400 text-xs font-medium">Reviewing immigration statutes...</div>
            `;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
