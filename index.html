<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Visa Attorney AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-slate-50 font-sans">

    <header class="bg-white border-b p-4 sticky top-0 shadow-sm">
        <div class="max-w-3xl mx-auto">
            <h1 class="text-xl font-bold text-slate-800">Visa Attorney Assistant</h1>
            <p class="text-xs text-red-600 font-bold">LEGAL INFO ONLY • NOT LEGAL ADVICE</p>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4">
        <div id="chat-window" class="h-[70vh] overflow-y-auto space-y-4 pb-10">
            </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-white border-t p-4">
        <div class="max-w-3xl mx-auto flex gap-2">
            <input type="text" id="userInput" class="flex-1 p-3 border rounded-xl shadow-inner" placeholder="Ask about H1B, L1, F1, J1 visas...etc">
            <button onclick="sendMessage()" class="bg-blue-600 text-white px-6 rounded-xl font-bold">Send</button>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('userInput');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';
            const loadingId = addLoading();

            try {
                const response = await fetch('http://localhost:8000/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "text": text })
                });
                
                const data = await response.json();
                document.getElementById(loadingId).remove();
                
                // Use marked.parse to handle the bolding and bullets
                appendMessage(data.reply, 'agent');
                
            } catch (err) {
                document.getElementById(loadingId).remove();
                appendMessage("Connection error. Is the backend running?", 'error');
            }
        }

        function appendMessage(content, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            
            // Format the content
            let htmlContent = content;
            if (sender === 'agent') {
                htmlContent = marked.parse(content);
            }

            const style = sender === 'user' ? "bg-blue-600 text-white" : "bg-white border text-slate-800";
            div.innerHTML = `<div class="p-4 rounded-2xl max-w-[90%] shadow-sm ${style}">${htmlContent}</div>`;
            
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function addLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.innerHTML = `<div class="p-4 text-slate-400 animate-pulse">Attorney is reviewing statutes...</div>`;
            chatWindow.appendChild(div);
            return id;
        }
    </script>
</body>
</html>
